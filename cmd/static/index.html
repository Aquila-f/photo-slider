<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Slideshow</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .slideshow {
      width: 100%;
      max-width: 1024px;
      padding: 1.5rem;
      text-align: center;
    }

    .album-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .album-label {
      font-size: 0.82rem;
      color: #666;
    }

    .album-bar select {
      background: #2a2a2a;
      color: #fff;
      border: 1px solid #444;
      padding: 0.35rem 0.7rem;
      border-radius: 5px;
      font-size: 0.9rem;
      cursor: pointer;
      max-width: 280px;
    }

    .album-bar select:focus { outline: none; border-color: #0a84ff; }

    .image-wrap {
      background: #1a1a1a;
      border-radius: 8px;
      overflow: hidden;
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-wrap img {
      max-width: 100%;
      max-height: 72vh;
      object-fit: contain;
      display: block;
    }

    .filename {
      margin-top: 0.6rem;
      font-size: 0.8rem;
      color: #666;
      min-height: 1.2em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .meta {
      margin-top: 0.3rem;
      font-size: 0.75rem;
      color: #555;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      margin-top: 1rem;
    }

    button {
      background: #2a2a2a;
      color: #fff;
      border: 1px solid #444;
      padding: 0.45rem 1rem;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1.1rem;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: #3a3a3a; }
    button:disabled { opacity: 0.3; cursor: default; }
    button.playing { background: #0a84ff; border-color: #0a84ff; }

    .counter {
      font-size: 0.9rem;
      color: #888;
      min-width: 72px;
    }

    .interval-row {
      margin-top: 0.8rem;
      font-size: 0.82rem;
      color: #666;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }

    .interval-row input[type=range] {
      width: 100px;
      accent-color: #0a84ff;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #444;
      cursor: pointer;
      transition: background 0.2s;
    }

    .dot.active { background: #0a84ff; }

    .empty { color: #555; font-size: 1.1rem; }

    .error {
      color: #ff453a;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div class="slideshow" x-data="slideshow()" x-init="init()">

    <div class="album-bar">
      <span class="album-label">Album:</span>
      <select x-model="currentAlbum" @change="loadPhotos()" :disabled="albums.length === 0">
        <template x-if="albums.length === 0">
          <option value="">No albums</option>
        </template>
        <template x-for="album in albums" :key="album.Key">
          <option :value="album.Key" x-text="album.Name || '(root)'"></option>
        </template>
      </select>
    </div>

    <div class="image-wrap">
      <template x-if="photos.length === 0">
        <p class="empty">No images found.</p>
      </template>
      <template x-if="photos.length > 0">
        <img :src="imageSrc" :alt="photos[current]">
      </template>
    </div>

    <p class="filename" x-text="photos[current] ?? ''"></p>
    <p class="meta" x-show="meta.takenAt || meta.model"
       x-text="[meta.model, meta.takenAt].filter(Boolean).join(' · ')"></p>
    <p class="error" x-show="error" x-text="error"></p>

    <div class="controls">
      <button @click="prev()" :disabled="photos.length === 0">&#8249;</button>
      <span class="counter" x-text="photos.length ? (current + 1) + ' / ' + photos.length : '-'"></span>
      <button @click="next()" :disabled="photos.length === 0">&#8250;</button>
      <button @click="togglePlay()" :class="{ playing }" :disabled="photos.length === 0"
        x-text="playing ? '⏸' : '▶'"></button>
    </div>

    <div class="interval-row">
      <span>interval:</span>
      <input type="range" min="1" max="30" x-model.number="interval" @input="restartIfPlaying()">
      <span x-text="interval + 's'"></span>
    </div>

    <div class="dots">
      <template x-for="(photo, i) in photos" :key="i">
        <div class="dot" :class="{ active: i === current }" @click="goTo(i)"></div>
      </template>
    </div>

  </div>

  <script>
    function slideshow() {
      return {
        albums: [],
        currentAlbum: '',
        photos: [],
        current: 0,
        playing: false,
        interval: 3,
        meta: { takenAt: '', model: '' },
        imageSrc: '',
        error: '',
        _timer: null,
        _abortCtrl: null,
        _preloadCache: new Map(),

        async init() {
          try {
            const res = await fetch('/api/albums')
            this.albums = await res.json() ?? []
          } catch {
            this.error = 'Failed to load albums.'
            return
          }
          if (this.albums.length > 0) {
            this.currentAlbum = this.albums[0].Key
            await this.loadPhotos()
          }
        },

        async loadPhotos() {
          clearInterval(this._timer)
          this.playing = false
          this.current = 0
          this.error = ''
          try {
            const res = await fetch('/api/albums/' + encodeURIComponent(this.currentAlbum))
            this.photos = await res.json() ?? []
          } catch {
            this.photos = []
            this.error = 'Failed to load photos.'
            return
          }
          this._revokePreloadCache()
          if (this.photos.length > 0) await this.loadImage()
        },

        photoUrl(token) {
          return '/photos/' + encodeURIComponent(this.currentAlbum) + '/' + encodeURIComponent(token)
        },

        _fetchPhoto(url, signal) {
          if (!this._preloadCache.has(url)) {
            const promise = fetch(url, { signal }).then(async res => {
              if (!res.ok) throw new Error('Network response was not ok');
              return {
                blob: await res.blob(),
                takenAt: res.headers.get('X-Photo-Taken-At'),
                model: res.headers.get('X-Photo-Model') || ''
              };
            }).catch(err => {
              this._preloadCache.delete(url);
              throw err;
            });
            this._preloadCache.set(url, promise);
          }
          return this._preloadCache.get(url);
        },

        async loadImage() {
          if (this.photos.length === 0) return

          if (this._abortCtrl) this._abortCtrl.abort()
          this._abortCtrl = new AbortController()
          const signal = this._abortCtrl.signal
          const target = this.current

          try {
            const url = this.photoUrl(this.photos[target])
            
            const data = await this._fetchPhoto(url, signal)

            if (signal.aborted) return

            this.error = ''
            this.meta = {
              takenAt: data.takenAt ? new Date(data.takenAt).toLocaleString() : '',
              model: data.model || '',
            }
            if (this.imageSrc) URL.revokeObjectURL(this.imageSrc)
            this.imageSrc = URL.createObjectURL(data.blob)
          } catch (e) {
            if (e.name === 'AbortError') return
            this.meta = { takenAt: '', model: '' }
            this.error = 'Failed to load image.'
          }
        },

        preloadAdjacent(index) {
          const targets = [
            (index + 1) % this.photos.length,
            (index - 1 + this.photos.length) % this.photos.length,
          ]
          for (const i of targets) {
            const url = this.photoUrl(this.photos[i])
            this._fetchPhoto(url).catch(() => {})
          }
        },

        _revokePreloadCache() {
          this._preloadCache.clear()
        },

        next() {
          this.current = (this.current + 1) % this.photos.length
          this.loadImage()
          this.preloadAdjacent(this.current)
          this.restartIfPlaying()
        },

        prev() {
          this.current = (this.current - 1 + this.photos.length) % this.photos.length
          this.loadImage()
          this.preloadAdjacent(this.current)
          this.restartIfPlaying()
        },

        goTo(i) {
          this.current = i
          this.loadImage()
          this.preloadAdjacent(i)
          this.restartIfPlaying()
        },

        togglePlay() {
          this.playing = !this.playing
          if (this.playing) {
            this._timer = setInterval(() => this.next(), this.interval * 1000)
          } else {
            clearInterval(this._timer)
          }
        },

        restartIfPlaying() {
          if (!this.playing) return
          clearInterval(this._timer)
          this._timer = setInterval(() => this.next(), this.interval * 1000)
        },
      }
    }
  </script>
</body>
</html>
