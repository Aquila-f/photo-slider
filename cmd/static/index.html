<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Slideshow</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/app.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  <div class="slideshow" :class="{ expanded }" x-data="slideshow()" x-init="init()" @keydown.window="handleKey($event)">

    <div class="source-section">
      <button class="source-toggle" @click="showSources = !showSources"
        x-text="(showSources ? '▾' : '▸') + ' Sources (' + sources.length + ')'"></button>
      <div class="source-panel" x-show="showSources" x-transition.duration.200ms>
        <div class="source-list">
          <template x-for="src in sources" :key="src">
            <div class="source-item">
              <span class="source-path" x-text="src"></span>
              <button class="source-delete" @click="deleteSource(src)">&times;</button>
            </div>
          </template>
          <p class="empty" x-show="sources.length === 0">No sources configured.</p>
        </div>
        <div class="source-add">
          <input type="text" x-model="newSourcePath" placeholder="Paste directory path..."
            @keydown.enter="addSource()">
          <button @click="addSource()">Add</button>
        </div>
        <p class="error" x-show="sourceError" x-text="sourceError"></p>
      </div>
    </div>

    <div class="album-bar">
      <span class="album-label">Album:</span>
      <select x-model="currentAlbum" @change="loadPhotos()" :disabled="albums.length === 0">
        <template x-if="albums.length === 0">
          <option value="">No albums</option>
        </template>
        <template x-for="album in albums" :key="album.Key">
          <option :value="album.Key" x-text="album.Name || '(root)'"></option>
        </template>
      </select>
      <label class="shuffle-toggle">
        <input type="checkbox" x-model="shuffle" @change="loadPhotos()">
        Shuffle
      </label>
    </div>

    <div class="image-wrap" @touchstart="handleTouchStart($event)" @touchend="handleTouchEnd($event)" @click="handleImageWrapClick()">
      <template x-if="photos.length === 0">
        <p class="empty">No images found.</p>
      </template>
      <template x-if="photos.length > 0">
        <img :src="imageSrc" :alt="photos[current]">
      </template>
      <div class="exit-hint" x-show="showExitHint" x-transition.opacity.duration.300ms>Press <kbd>Esc</kbd> or <kbd>f</kbd> to exit fullscreen</div>
      <div class="expand-info" x-show="expanded">
        <span x-text="photos.length ? (current + 1) + ' / ' + photos.length : ''"></span>
        <span x-text="photos[current] ?? ''"></span>
        <span x-text="[meta.model, meta.takenAt].filter(Boolean).join(' · ')"></span>
      </div>
    </div>

    <p class="filename" x-text="photos[current] ?? ''"></p>
    <p class="meta" x-show="meta.takenAt || meta.model"
       x-text="[meta.model, meta.takenAt].filter(Boolean).join(' · ')"></p>
    <p class="error" x-show="error" x-text="error"></p>

    <div class="controls">
      <button @click="prev()" :disabled="photos.length === 0">&#8249;</button>
      <span class="counter" x-text="photos.length ? (current + 1) + ' / ' + photos.length : '-'"></span>
      <button @click="next()" :disabled="photos.length === 0">&#8250;</button>
      <button @click="togglePlay()" :class="{ playing }" :disabled="photos.length === 0"
        x-text="playing ? '⏸' : '▶'"></button>
      <button @click="toggleExpand()" :class="{ expanded }"
        x-text="expanded ? '⛶' : '⛶'">⛶</button>
    </div>

    <div class="interval-row">
      <span>interval:</span>
      <input type="range" min="1" max="30" x-model.number="interval" @input="restartIfPlaying()">
      <span x-text="interval + 's'"></span>
    </div>

    <div class="dots">
      <template x-for="(photo, i) in photos" :key="i">
        <div class="dot" :class="{ active: i === current }" @click="goTo(i)"></div>
      </template>
    </div>

  </div>
</body>
</html>
